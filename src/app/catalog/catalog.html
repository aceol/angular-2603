<main class="py-4 container">
  <header class="p-4 mb-4 rounded-3" [class.bg-info]="isHovered" (mouseenter)="toggleIsHovered()" (mouseleave)="toggleIsHovered()">
    <h1>{{title | uppercase}}</h1>
    <p>Votre panier s'élève à {{ total() | currency }}</p>
    <p class="mb-0"><a class="btn btn-primary btn-large" routerLink="/basket">Voir mon panier</a></p>
  </header>

  <h2 class="h4">Catalogue</h2>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
    @if(products()) {
    @if(hasProductsInStock()) {
    @for(product of products(); track product.id) {
    @if(product.stock > 0){
    <app-product-card class="col" [product]="product" (addToBasket)="updateTotal($event)"></app-product-card>
    }
    }
    } @else {
    <span class="text-secondary">Désolé, notre stock est vide !</span>
    }
    }
  </div>
</main>
